spring:
  application:
    name: inventory-seat-service
  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/inventory_db}
    username: ${DB_USERNAME:aliwert}
    password: ${DB_PASSWORD:5858}
    pool:
      max-size: 10
      initial-size: 2
      max-idle-time: 30m
  flyway:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/inventory_db}
    user: ${DB_USERNAME:aliwert}
    password: ${DB_PASSWORD:5858}
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
      group-id: inventory-seat-service

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [%X{correlation-id:-}]"

app:
  kafka:
    intent-topic: intent.created
    seat-locked-topic: seat.locked
    seat-released-topic: seat.released
