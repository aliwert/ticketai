name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - discovery-server
          - api-gateway
          - auth-service
          - ai-intent-service
          - inventory-seat-service
          - payment-service
          - ticket-service
          - notification-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: gradle
      - run: ./gradlew compileKotlin --no-daemon
