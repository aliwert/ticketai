spring:
  application:
    name: auth-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
  flyway:
    url: jdbc:postgresql://localhost:5432/auth_db
    user: postgres
    password: postgres
    locations: classpath:db/migration

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
