spring:
  application:
    name: auth-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/auth_db
    username: aliwert
    password: 5858
    pool:
      max-size: 10
      initial-size: 2
      max-idle-time: 30m
  flyway:
    url: jdbc:postgresql://localhost:5432/auth_db
    user: aliwert
    password: 5858
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [%X{correlation-id:-}]"

app:
  jwt:
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  issuer: ticketa-auth
  jwk:
    key-size: 2048
