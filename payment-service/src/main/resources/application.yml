spring:
  application:
    name: payment-service
  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/payment_db}
    username: ${DB_USERNAME:aliwert}
    password: ${DB_PASSWORD:5858}
    pool:
      max-size: 10
      initial-size: 2
      max-idle-time: 30m
  flyway:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/payment_db}
    user: ${DB_USERNAME:aliwert}
    password: ${DB_PASSWORD:5858}
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
      group-id: payment-service

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [%X{correlation-id:-}] [%X{traceId:-},%X{spanId:-}]"
