apiVersion: v1
kind: Service
metadata:
  name: ticket-service
  namespace: ticketa
spec:
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: ticket-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  namespace: ticketa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-service
  template:
    metadata:
      labels:
        app: ticket-service
    spec:
      containers:
        - name: ticket-service
          image: ticketa/ticket-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
            - name: DB_R2DBC_URL
              value: r2dbc:postgresql://postgres:5432/ticket_db
            - name: DB_JDBC_URL
              value: jdbc:postgresql://postgres:5432/ticket_db
            - name: DB_USERNAME
              value: ticketa
            - name: DB_PASSWORD
              value: ticketa
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://otel-collector:4318/v1/traces
