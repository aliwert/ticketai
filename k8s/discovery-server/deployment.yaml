apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: ticketa
spec:
  ports:
    - port: 8761
      targetPort: 8761
  selector:
    app: discovery-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: ticketa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: ticketa/discovery-server:latest
          ports:
            - containerPort: 8761
          env:
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://otel-collector:4318/v1/traces
