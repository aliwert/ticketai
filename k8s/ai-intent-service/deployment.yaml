apiVersion: v1
kind: Service
metadata:
  name: ai-intent-service
  namespace: ticketa
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: ai-intent-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-intent-service
  namespace: ticketa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-intent-service
  template:
    metadata:
      labels:
        app: ai-intent-service
    spec:
      containers:
        - name: ai-intent-service
          image: ticketa/ai-intent-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai
                  key: api-key
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://otel-collector:4318/v1/traces
