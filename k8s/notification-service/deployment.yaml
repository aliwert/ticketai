apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ticketa
spec:
  ports:
    - port: 8086
      targetPort: 8086
  selector:
    app: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ticketa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ticketa/notification-service:latest
          ports:
            - containerPort: 8086
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
            - name: DB_R2DBC_URL
              value: r2dbc:postgresql://postgres:5432/notification_db
            - name: DB_JDBC_URL
              value: jdbc:postgresql://postgres:5432/notification_db
            - name: DB_USERNAME
              value: ticketa
            - name: DB_PASSWORD
              value: ticketa
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://otel-collector:4318/v1/traces
